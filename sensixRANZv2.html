<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSIX RANZ - PREMIUM INJECTOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .neon-border {
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
        }

        /* Switch Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Custom UI */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .page-transition { animation: fadeIn 0.4s ease-out forwards; }

        .toast-notif {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--neon-blue);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
        }

        .info-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .info-panel.show { max-height: 120px; }

        input {
            background: rgba(0,0,0,0.4) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
        }
        input:focus { border-color: var(--neon-blue) !important; }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="main-container w-full max-w-md mx-auto px-6">
        
        <!-- HALAMAN 1: LOGIN -->
        <div id="page-login" class="w-full page-transition">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black tracking-tighter text-white font-['Orbitron']">
                    SENSIX <span class="text-[#00d2ff]">RANZ</span>
                </h1>
                <p class="text-zinc-500 text-[10px] mt-2 uppercase tracking-[0.3em]">Premium Access Only</p>
            </div>

            <div class="glass p-8 rounded-3xl neon-border space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 ml-1">Username</label>
                    <input type="text" id="login-user" class="w-full rounded-xl p-3.5 mt-1 text-sm outline-none transition-all" placeholder="Input User ID">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 ml-1">Password</label>
                    <input type="password" id="login-pass" class="w-full rounded-xl p-3.5 mt-1 text-sm outline-none transition-all" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-[#00d2ff] to-[#9d50bb] py-4 rounded-xl text-black font-bold uppercase text-[11px] tracking-widest mt-2 active:scale-95 transition-all">
                    Aktivasi Akses
                </button>
                <div class="text-center pt-2">
                    <p class="text-xs text-zinc-500">Belum punya akun? <span onclick="showPage('page-register')" class="text-[#00d2ff] cursor-pointer font-bold">Daftar Di Sini</span></p>
                </div>
            </div>
            <div id="login-error" class="text-center mt-4 text-red-500 text-[11px] font-bold hidden uppercase tracking-widest">Akses Ditolak! Cek User/Pass.</div>
        </div>

        <!-- HALAMAN 3: CREATE ACCOUNT -->
        <div id="page-register" class="hidden w-full page-transition">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black tracking-tighter text-white font-['Orbitron']">CREATE <span class="text-[#00d2ff]">ACCOUNT</span></h1>
                <p class="text-zinc-500 text-[10px] mt-2 uppercase tracking-widest">Bergabung dengan Sensix Ranz</p>
            </div>

            <div class="glass p-8 rounded-3xl border border-white/10 space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 ml-1">Email Address</label>
                    <input type="email" id="reg-email" class="w-full rounded-xl p-3.5 mt-1 text-sm outline-none transition-all" placeholder="user@email.com">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 ml-1">Create Username</label>
                    <input type="text" id="reg-user" class="w-full rounded-xl p-3.5 mt-1 text-sm outline-none transition-all" placeholder="Username">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-zinc-400 ml-1">Create Password</label>
                    <input type="password" id="reg-pass" class="w-full rounded-xl p-3.5 mt-1 text-sm outline-none transition-all" placeholder="Password">
                </div>
                <button onclick="handleRegister()" class="w-full bg-white text-black py-4 rounded-xl font-bold uppercase text-[11px] tracking-widest mt-2 active:scale-95 transition-all">
                    Simpan Akun
                </button>
                <button onclick="showPage('page-login')" class="w-full text-zinc-400 text-[10px] uppercase font-bold tracking-widest mt-2">
                    Kembali Ke Login
                </button>
            </div>
        </div>

        <!-- HALAMAN 2: MENU UTAMA -->
        <div id="page-menu" class="hidden w-full h-[85vh] flex flex-col page-transition">
            <div class="flex items-center justify-between mb-6 px-2">
                <div>
                    <h2 class="text-xl font-bold font-['Orbitron'] tracking-tighter uppercase">Injector</h2>
                    <p id="current-user-display" class="text-[10px] text-[#00d2ff] font-bold">User: -</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="location.reload()" class="w-9 h-9 rounded-full border border-red-500/30 bg-red-500/10 flex items-center justify-center text-xs">🚪</button>
                    <div class="w-9 h-9 rounded-full border border-[#00d2ff] bg-white/10 flex items-center justify-center shadow-[0_0_10px_rgba(0,210,255,0.3)]">🔥</div>
                </div>
            </div>

            <div id="features-list" class="flex-1 overflow-y-auto custom-scroll pr-2 space-y-4">
                <!-- Fitur akan di-render melalui JavaScript -->
            </div>

            <div class="text-center mt-4 text-[10px] text-zinc-600 uppercase tracking-[0.4em] font-bold">
                SENSIX RANZ &bull; 2024
            </div>
        </div>

    </div>

    <!-- Notification -->
    <div id="toast" class="toast-notif">STATUS: ON</div>

    <script>
        // Inisialisasi Akun Default
        if(!localStorage.getItem('sensix_accounts')) {
            localStorage.setItem('sensix_accounts', JSON.stringify([{user: "54CH4N", pass: "12345", email: "admin@sensix.com"}]));
        }

        // Snowfall logic
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initSnow() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = Array.from({ length: 40 }, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                r: Math.random() * 2, s: Math.random() * 0.4 + 0.2, o: Math.random() * 0.4 + 0.1
            }));
        }
        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 210, 255, ${p.o})`; ctx.fill();
                p.y += p.s; if (p.y > canvas.height) p.y = -10;
            });
            requestAnimationFrame(drawSnow);
        }
        window.onload = () => { initSnow(); drawSnow(); };
        window.onresize = initSnow;

        // Sound System
        function playBeep() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = context.createOscillator();
                const gain = context.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(950, context.currentTime);
                gain.gain.setValueAtTime(0.08, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.12);
                oscillator.connect(gain); gain.connect(context.destination);
                oscillator.start(); oscillator.stop(context.currentTime + 0.12);
            } catch(e) {}
        }

        // Navigation System
        function showPage(pageId) {
            document.querySelectorAll('.main-container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        // Auth Logic
        function handleRegister() {
            const email = document.getElementById('reg-email').value.trim();
            const user = document.getElementById('reg-user').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();

            if(!email || !user || !pass) {
                showToast("ISI SEMUA DATA!");
                return;
            }

            let accounts = JSON.parse(localStorage.getItem('sensix_accounts'));
            if(accounts.find(a => a.user === user)) {
                showToast("USERNAME SUDAH TERPAKAI!");
                return;
            }

            accounts.push({ email, user, pass });
            localStorage.setItem('sensix_accounts', JSON.stringify(accounts));
            
            showToast("AKUN BERHASIL DIBUAT!");
            playBeep();
            setTimeout(() => showPage('page-login'), 1500);
        }

        function handleLogin() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const accounts = JSON.parse(localStorage.getItem('sensix_accounts'));

            const foundAccount = accounts.find(a => a.user === user && a.pass === pass);

            if (foundAccount) {
                showToast("LOGIN SUKSES! MEMUAT DATA...");
                playBeep();
                document.getElementById('current-user-display').innerText = `User: ${user.toUpperCase()}`;
                setTimeout(() => {
                    showPage('page-menu');
                    renderFeatures();
                }, 1200);
            } else {
                const err = document.getElementById('login-error');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }

        // Features Data
        const FEATURES = [
            { name: "Aim Lock 5%", icon: "🎯", info: "Mengunci bidikan ke target dengan akurasi tambahan sebesar 5%." },
            { name: "Pelicin Layar", icon: "🧴", info: "Meningkatkan sensitivitas sentuhan agar pergerakan kursor lebih mulus." },
            { name: "Aim Body", icon: "🛡️", info: "Otomatisasi bidikan diprioritaskan untuk mengarah ke area badan musuh." },
            { name: "Aim Kepala", icon: "💀", info: "Sistem pengunci bidikan yang menargetkan kepala musuh secara instan." },
            { name: "Grafik Minecraft", icon: "🧱", info: "Mengurangi detail grafik game menjadi kubus untuk FPS tinggi." },
            { name: "FPS Boost", icon: "🚀", info: "Mengoptimalkan sistem untuk mendapatkan frame per second yang stabil." },
            { name: "DPI 500", icon: "鼠标", info: "Mengatur kerapatan pixel layar ke 500 DPI untuk kontrol presisi." },
            { name: "Game Mode API", icon: "🌐", info: "Protokol khusus jalur data game untuk ping rendah." },
            { name: "Drag Smooth", icon: "🌪️", info: "Membuat tarikan tombol tembak menjadi lebih halus tanpa hentakan." }
        ];

        function renderFeatures() {
            const list = document.getElementById('features-list');
            list.innerHTML = "";
            
            FEATURES.forEach((f, index) => {
                const id = `f-${index}`;
                const card = document.createElement('div');
                card.className = 'glass p-4 rounded-2xl border border-white/5 shadow-xl';
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <span class="text-xl">${f.icon}</span>
                            <span class="text-sm font-bold tracking-wide">${f.name}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="document.getElementById('${id}').classList.toggle('show')" class="text-zinc-500 hover:text-[#00d2ff]">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                            </button>
                            <label class="switch">
                                <input type="checkbox" onchange="toggleFeature(this, '${f.name}')">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div id="${id}" class="info-panel">
                        <p class="text-[11px] text-zinc-400 pt-3 border-t border-white/5 mt-3 leading-relaxed italic">
                            ${f.info}
                        </p>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function toggleFeature(checkbox, name) {
            checkbox.disabled = true;
            setTimeout(() => {
                playBeep();
                showToast(`${name.toUpperCase()} : ${checkbox.checked ? 'SUDAH ON' : 'SUDAH OFF'}`);
                checkbox.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
